services:
  backend:
    image: ghcr.io/bepplinh/datban/backend:latest
    container_name: datban-backend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - datban-network
    depends_on:
      - redis

  redis:
    image: redis:alpine
    container_name: datban-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - datban-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: ghcr.io/bepplinh/datban/frontend:latest
    container_name: datban-frontend
    restart: always
    ports:
      - "8081:80"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - datban-network

networks:
  datban-network:
    driver: bridge
