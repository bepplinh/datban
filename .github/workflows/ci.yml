name: Backend CI/CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "docker-compose.yml"
      - ".github/workflows/**"

jobs:
  # ─── CI: Backend CI ────────────────────────────────
  backend-ci:
    name: Backend — Lint & Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: cd backend && npm ci

      - name: Generate Prisma Client
        run: cd backend && npx prisma generate

      - name: Docker Build Check
        run: docker build -t backend-check ./backend

  # ─── CD: Deploy Backend to VPS ─────────────────────
  deploy-backend:
    name: Deploy Backend to VPS
    runs-on: ubuntu-latest
    needs: [backend-ci]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            # 1. Update Code (Chỉ lấy folder backend và docker-compose)
            cd ~/datban
            git pull origin main

            # 2. Build và Restart container Backend
            # Docker sẽ tự động nhận diện thay đổi trong folder backend
            docker compose up -d --build backend

            # 3. Dọn dẹp máy chủ (Xóa image thừa để tiết kiệm ổ cứng)
            docker image prune -f

            # 4. Kiểm tra logs nhanh
            docker ps | grep datban-backend
