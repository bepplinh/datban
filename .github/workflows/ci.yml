name: Backend CI/CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "docker-compose.yml"
      - ".github/workflows/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  # ─── CI: Backend CI ────────────────────────────────
  backend-ci:
    name: Backend — Lint & Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        env:
          PRISMA_SKIP_POSTINSTALL_GENERATE: "1"
        run: |
          cd backend
          npm ci --verbose

      - name: Generate Prisma Client
        run: |
          cd backend
          npx prisma generate
        env:
          DATABASE_URL: "mysql://root:password@localhost:3306/datban"

  # ─── CD: Build and Push to GHCR ─────────────────────
  build-and-push:
    name: Build & Push Backend to GHCR
    runs-on: ubuntu-latest
    needs: [backend-ci]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  # ─── CD: Deploy Backend to VPS ─────────────────────
  deploy-backend:
    name: Deploy Backend to VPS
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /var/www/shoppingcar

            # 1. Cập nhật file docker-compose.yml (để lấy tag mới nhất hoặc cấu hình mới)
            git pull origin main

            # 2. Login vào GHCR trên VPS (Lưu ý: Bạn có thể cần chạy docker login thủ công 1 lần trên VPS với PAT)
            # Hoặc nếu repo public thì không cần. Nếu private, dùng dòng dưới:
            # echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 3. Pull image mới nhất từ GHCR
            docker compose pull backend

            # 4. Restart container Backend (không build lại trên VPS)
            docker compose up -d backend

            # 5. Dọn dẹp máy chủ
            docker image prune -f

            # 6. Kiểm tra trạng thái
            docker ps | grep backend
