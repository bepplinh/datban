name: Datban CI/CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.yml"
      - ".github/workflows/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:
  # ─── CI: Quality Checks ────────────────────────────────
  ci-checks:
    name: CI — Lint & Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Backend — Install & Prisma Generate
        run: |
          cd backend
          npm ci
          npx prisma generate
        env:
          DATABASE_URL: "mysql://root:password@localhost:3306/datban"

      - name: Frontend — Install & Build Check
        run: |
          cd frontend
          npm ci --legacy-peer-deps
          npm run build

  # ─── CD: Build and Push Images to GHCR ─────────────────
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    needs: [ci-checks]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - context: ./backend
            image: backend
          - context: ./frontend
            image: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.image }}:latest
          build-args: |
            VITE_API_URL=${{ matrix.image == 'frontend' && 'https://api.shoppingcar.io.vn/api' || '' }}

  # ─── CD: Deploy to VPS ─────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /var/www/datban

            # 1. Cập nhật docker-compose.yml
            git pull origin main

            # 2. Pull images mới nhất từ GHCR
            docker compose pull

            # 3. Restart tất cả services
            docker compose up -d

            # 4. Dọn dẹp
            docker image prune -f

            # 5. Kiểm tra
            docker ps | grep datban
